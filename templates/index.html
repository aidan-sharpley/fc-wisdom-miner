<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Forum Q&A</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem auto;
      max-width: 800px;
    }

    textarea,
    input[type="text"],
    select {
      width: 100%;
      margin: 0.5rem 0;
      padding: 0.5rem;
    }

    button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
    }

    pre {
      white-space: pre-wrap;
      background: #f4f4f4;
      padding: 1rem;
    }
  </style>
</head>

<body>
  <h1>Ask a Question About a Forum Thread</h1>

  <form id="qaForm">
    <label>Select existing thread:</label>
    <select id="existing" name="url">
      <option value="">-- Choose a thread --</option>
      {% for thread in threads %}
      <option value="{{ thread }}">{{ thread }}</option>
      {% endfor %}
    </select>

    <label>Or enter new thread URL:</label>
    <input type="text" id="url" name="url" placeholder="https://example.com/thread" />

    <label>Your Question:</label>
    <textarea name="prompt" required></textarea>

    <label><input type="checkbox" name="refresh" value="true" /> Refresh/Redownload</label><br />

    <button type="submit">Ask</button>
  </form>

  <h2>Answer:</h2>
  <pre id="response"></pre>

  <script>
    const form = document.getElementById("qaForm");
    const responseBox = document.getElementById("response");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      responseBox.textContent = "Thinking...";

      const formData = new FormData(form);
      const selected = form.elements["existing"].value;
      const custom = form.elements["url"].value;

      if (!custom && selected) {
        formData.set("url", selected);
      }

      const res = await fetch("/ask", {
        method: "POST",
        body: formData,
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder("utf-8");

      responseBox.textContent = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        responseBox.textContent += decoder.decode(value, { stream: true });
      }
    });
  </script>
</body>

</html>
