<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Forum Wisdom Miner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 1em auto;
    }

    form {
      margin-bottom: 1em;
    }

    label {
      display: block;
      margin-top: 1em;
    }

    #response {
      white-space: pre-wrap;
      background: #f8f8f8;
      padding: 1em;
      border: 1px solid #ddd;
      min-height: 100px;
      max-height: 400px;
      overflow-y: auto;
    }
  </style>
</head>

<body>
  <h1>Forum Wisdom Miner</h1>

  {% with messages = get_flashed_messages() %}
  {% if messages %}
  <ul style="color: red;">
    {% for message in messages %}
    <li>{{ message }}</li>
    {% endfor %}
  </ul>
  {% endif %}
  {% endwith %}

  <form id="ask-form">
    <label for="thread-select">Or select an existing thread:</label>
    <select id="thread-select" name="existing_thread">
      <option value="">-- select a thread --</option>
      {% for thread in threads %}
      <option value="{{ thread }}">{{ thread }}</option>
      {% endfor %}
    </select>

    <label for="url">Or enter thread URL:</label>
    <input type="text" id="url" name="url" placeholder="https://example.com/forum/thread/12345" style="width: 100%;" />

    <label for="prompt">Your question:</label>
    <textarea id="prompt" name="prompt" placeholder="Ask a question about this thread..." rows="3" required
      style="width: 100%;"></textarea>

    <label><input type="checkbox" id="refresh" name="refresh" /> Refresh forum data</label>

    <button type="submit">Ask</button>
  </form>

  <pre id="response"></pre>

  <script>
    const form = document.getElementById("ask-form");
    const responseEl = document.getElementById("response");
    const urlInput = document.getElementById("url");
    const threadSelect = document.getElementById("thread-select");

    // When selecting a thread, clear URL input to avoid conflicts
    threadSelect.addEventListener("change", () => {
      if (threadSelect.value) {
        urlInput.value = "";
      }
    });

    // When typing in URL input, clear thread select to avoid conflicts
    urlInput.addEventListener("input", () => {
      if (urlInput.value.trim() !== "") {
        threadSelect.value = "";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const existing_thread = threadSelect.value.trim();
      const url = urlInput.value.trim();
      const prompt = document.getElementById("prompt").value.trim();
      const refresh = document.getElementById("refresh").checked;

      if (!prompt) {
        alert("Please enter a question.");
        return;
      }
      if (!existing_thread && !url) {
        alert("Please select an existing thread or enter a thread URL.");
        return;
      }

      responseEl.textContent = "";
      // Disable button while loading (optional)
      form.querySelector("button[type=submit]").disabled = true;

      const body = { prompt, refresh };
      if (existing_thread) {
        body.existing_thread = existing_thread;
      } else {
        body.url = url;
      }

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const errorText = await res.text();
          responseEl.textContent = `Error: ${errorText}`;
          form.querySelector("button[type=submit]").disabled = false;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          responseEl.textContent += decoder.decode(value);
          responseEl.scrollTop = responseEl.scrollHeight;
        }
      } catch (err) {
        responseEl.textContent = `Error: ${err.message}`;
      } finally {
        form.querySelector("button[type=submit]").disabled = false;
      }
    });
  </script>
</body>

</html>
