<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Forum Thread Q&A</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      max-width: 800px;
    }

    textarea {
      width: 100%;
      height: 100px;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }

    button {
      padding: 0.5rem 1rem;
      margin-top: 1rem;
    }

    pre {
      background: #f4f4f4;
      padding: 1rem;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h1>Forum Thread Q&A</h1>

  <form method="post">
    <label for="url">Select existing thread or enter new URL:</label><br />
    <select id="existing_thread" onchange="document.getElementById('url').value = this.value;">
      <option value="">-- Select a saved thread --</option>
      {% for thread in threads %}
      <option value="https://fuckcombustion.com/threads/{{ thread }}/" {% if selected_thread_url and
        selected_thread_url.endswith(thread) %}selected{% endif %}>
        {{ thread }}
      </option>
      {% endfor %}
    </select><br />

    <input id="url" name="url" type="text" placeholder="https://fuckcombustion.com/threads/phase3-vaporizers.48407"
      required value="{{ selected_thread_url or '' }}" /><br />

    <label for="prompt">Your Question about the thread:</label><br />
    <textarea id="prompt" name="prompt" placeholder="Ask your question here..."></textarea><br />

    <button type="submit" name="action" value="ask">Ask</button>
    <button type="submit" name="refresh" value="true"
      onclick="document.getElementsByName('refresh')[0].value='true'">Refresh Thread Data</button>
    <input type="hidden" name="refresh" value="false" />
  </form>

  {% if response %}
  <h2>Response:</h2>
  <pre>{{ response }}</pre>
  {% endif %}
</body>

</html>
